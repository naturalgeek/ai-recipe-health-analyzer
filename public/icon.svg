<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#FFF8F0"/>
  <!-- Leaf -->
  <g transform="translate(256, 256)">
    <!-- Main leaf shape -->
    <path d="M-20,-140 C60,-140 140,-60 140,40 C140,100 100,140 40,140 C-20,140 -60,120 -80,80 C-100,40 -100,-20 -80,-60 C-60,-100 -20,-140 -20,-140 Z"
          fill="url(#leaf)"
          transform="rotate(-30)"/>
    <!-- Leaf vein -->
    <path d="M0,-100 Q0,0 -40,80"
          stroke="white"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          opacity="0.6"
          transform="rotate(-30)"/>
    <!-- Side veins -->
    <path d="M0,-60 Q20,-40 40,-50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-30)"/>
    <path d="M0,-20 Q25,0 50,-5" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-30)"/>
    <path d="M-10,30 Q15,50 35,45" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-30)"/>
  </g>
  <!-- AI text indicator -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="#d24400">AI</text>
</svg>
